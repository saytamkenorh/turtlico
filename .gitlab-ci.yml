image: "registry.gitlab.gnome.org/gnome/gnome-runtime-images/gnome:3.34"

cache:
 key: "$CI_JOB_NAME"
 paths:
  - '.flatpak-builder/downloads'
  - '.flatpak-builder/git'

variables:
 APP_ID: "tk.turtlico.Turtlico"
 BUNDLE_FILENAME: "turtlico-master.flatpak"

build:
 script:
  - flatpak-builder --repo=repo --force-clean _build ${APP_ID}.json
  - flatpak build-bundle ./repo ${BUNDLE_FILENAME} ${APP_ID}
 artifacts:
  paths:
   - ${BUNDLE_FILENAME}
  expire_in: 1 month

